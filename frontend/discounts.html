<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP — Discounts</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .sale-banner{background:linear-gradient(135deg,#f43f5e,#fb923c);color:#fff;padding:3rem 0 2.5rem;text-align:center;margin-bottom:2rem;position:relative;overflow:hidden}
    .sale-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,0.15),transparent 60%)}
    .sale-banner .container{position:relative;z-index:1}
    .sale-banner h1{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;margin-bottom:.5rem}
    .sale-banner p{font-size:clamp(0.9rem,2.5vw,1.1rem);opacity:.9;margin-bottom:1rem}
    .countdown-wrap{display:inline-flex;gap:clamp(0.5rem,2vw,1.25rem);margin-top:1rem;background:rgba(0,0,0,.25);padding:.65rem 1.25rem;border-radius:var(--radius);backdrop-filter:blur(8px)}
    .countdown-unit{text-align:center;min-width:44px}
    .countdown-num{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;display:block;line-height:1}
    .countdown-label{font-size:.65rem;opacity:.8;text-transform:uppercase;letter-spacing:.5px}
    .product-card .discount-pct{font-size:1.1rem;font-weight:800;color:#ff6584}
    @media(max-width:480px){
      .sale-banner{padding:2rem 0 1.75rem}
      .countdown-wrap{gap:0.4rem;padding:.5rem .75rem}
      .countdown-unit{min-width:36px}
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="sale-banner">
    <div class="container">
      <h1>🔥 <span data-i18n="discounts.title">Chegirmalar</span></h1>
      <p>Limited time offers — don't miss out!</p>
      <div class="countdown-wrap" id="main-countdown">
        <div class="countdown-unit"><span class="countdown-num" id="cd-h">00</span><span class="countdown-label">Hours</span></div>
        <div class="countdown-unit"><span class="countdown-num" id="cd-m">00</span><span class="countdown-label">Min</span></div>
        <div class="countdown-unit"><span class="countdown-num" id="cd-s">00</span><span class="countdown-label">Sec</span></div>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="sale-products" class="products-grid">
      <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
    <div id="sale-pagination" class="pagination"></div>
  </div>

  <footer><div class="container"><p>© 2026 SHOP</p></div></footer>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    Theme.init();
    I18N.init().then(function() {
      Auth.updateNavbar();
      CartUI.updateBadge();
      startMainCountdown();
      loadSaleProducts(1);
    });

    function startMainCountdown() {
      // Sale ends at midnight
      var endOfDay = new Date();
      endOfDay.setHours(23, 59, 59, 0);
      var update = function() {
        var diff = endOfDay - new Date();
        if (diff <= 0) return;
        document.getElementById('cd-h').textContent = String(Math.floor(diff / 3600000)).padStart(2,'0');
        document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
        document.getElementById('cd-s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
      };
      update();
      setInterval(update, 1000);
    }

    async function loadSaleProducts(page) {
      try {
        var data = await api.get('/products?sale=true&page=' + page + '&limit=16&sort=price_asc');
        var user = Auth.getUser();
        var favs = user ? (user.favorites || []) : [];
        var grid = document.getElementById('sale-products');
        if (!data.products.length) { grid.innerHTML = '<p class="text-muted text-center" style="grid-column:1/-1">No sale products right now</p>'; return; }
        grid.innerHTML = data.products.map(function(p) { return renderProductCard(p, favs); }).join('');

        var pages = data.pages;
        var pagEl = document.getElementById('sale-pagination');
        if (pages > 1) {
          var html = '';
          for (var i = 1; i <= pages; i++) html += '<button class="page-btn' + (i === page ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
          pagEl.innerHTML = html;
          pagEl.querySelectorAll('.page-btn').forEach(function(btn) {
            btn.addEventListener('click', function() { loadSaleProducts(parseInt(this.dataset.page)); window.scrollTo(0,0); });
          });
        }

        document.querySelectorAll('.add-to-cart-btn').forEach(function(btn) {
          btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
            try { await api.post('/cart', { productId: this.dataset.id, quantity: 1 }); Toast.success('Qo\'shildi!'); CartUI.updateBadge(); }
            catch(e) { Toast.error(e.message); }
          });
        });
        document.querySelectorAll('.fav-btn').forEach(function(btn) {
          btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
            var user = Auth.getUser();
            try { await api.post('/users/' + user.id + '/favorites/' + this.dataset.id, {}); this.classList.toggle('active'); this.textContent = this.classList.contains('active') ? '❤️' : '🤍'; }
            catch(e) { Toast.error(e.message); }
          });
        });
        document.querySelectorAll('.product-card').forEach(function(card) {
          card.addEventListener('click', function(e) {
            if (e.target.closest('button')) return;
            ProductModal.open(this.dataset.id);
          });
        });
      } catch(e) { Toast.error(e.message); }
    }
  </script>
<script src="js/bg-animation.js"></script>
</body>
</html>
