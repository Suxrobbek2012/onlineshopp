<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP — Kirish</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="auth-page">
    <div class="auth-card animate-fade-up">
      <div class="auth-logo"><span>🛍 SHOP</span></div>
      <h1 class="auth-title" data-i18n="auth.login">Kirish</h1>
      <p class="auth-subtitle">Hisobingizga xush kelibsiz</p>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" data-i18n="auth.identifier">Foydalanuvchi nomi yoki telefon</label>
          <input type="text" id="identifier" class="form-control" data-i18n-placeholder="auth.identifier" autocomplete="username" required>
          <div class="form-error" id="err-identifier"></div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="auth.password">Parol</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-control" autocomplete="current-password" required>
            <button type="button" class="password-toggle" id="pw-toggle">👁</button>
          </div>
          <div class="form-error" id="err-password"></div>
        </div>
        <div class="form-group flex-between" style="flex-wrap:wrap;gap:.5rem">
          <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.875rem">
            <input type="checkbox" id="remember-me" style="accent-color:var(--primary)">
            <span data-i18n="auth.remember_me">Meni eslab qol</span>
          </label>
          <a href="#" style="font-size:.875rem;color:var(--primary)" data-i18n="auth.forgot_password">Parolni unutdingizmi?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2" id="login-btn">
          <span data-i18n="auth.login">Kirish</span>
        </button>
      </form>

      <div class="auth-divider">yoki</div>
      <p class="text-center" style="color:var(--text-muted);font-size:.9rem">
        <span data-i18n="auth.no_account">Hisobingiz yo'qmi?</span>
        <a href="register.html" style="font-weight:700;margin-left:.3rem" data-i18n="auth.register">Ro'yxatdan o'tish</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    Theme.init();
    I18N.init().then(function() { Auth.updateNavbar(); });
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('pw-toggle').addEventListener('click', function() {
      var pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.textContent = pw.type === 'password' ? '👁' : '🙈';
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px"></div>';
      try {
        var data = await api.post('/auth/login', {
          identifier: document.getElementById('identifier').value.trim(),
          password: document.getElementById('password').value
        });
        Auth.setSession(data.token, data.user);
        Toast.success(I18N.t('auth.login_success') + ', ' + data.user.fullName + '!');
        setTimeout(function() {
          window.location.href = data.user.role === 'admin' ? 'admin/index.html' : 'index.html';
        }, 700);
      } catch(err) {
        Toast.error(err.message);
        btn.disabled = false;
        btn.innerHTML = '<span data-i18n="auth.login">' + I18N.t('auth.login') + '</span>';
      }
    });
  </script>
<script src="js/bg-animation.js"></script>
</body>
</html>
