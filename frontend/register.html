<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP — Ro'yxatdan o'tish</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="auth-page">
    <div class="auth-card animate-fade-up" style="max-width:520px">
      <div class="auth-logo"><span>🛍 SHOP</span></div>
      <h1 class="auth-title" data-i18n="auth.register">Ro'yxatdan o'tish</h1>
      <p class="auth-subtitle">SHOP da hisob yarating</p>

      <form id="register-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label class="form-label" data-i18n="auth.full_name">To'liq ism</label>
            <input type="text" id="fullName" class="form-control" required autocomplete="name">
            <div class="form-error" id="err-fullName"></div>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="auth.username">Foydalanuvchi nomi</label>
            <input type="text" id="username" class="form-control" required minlength="3" autocomplete="username">
            <div class="form-error" id="err-username"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="auth.phone">Telefon raqam</label>
          <div class="phone-group">
            <select id="countryCode" class="form-control country-select"></select>
            <input type="tel" id="phone" class="form-control phone-input" placeholder="901234567" required pattern="[0-9]+">
          </div>
          <div class="form-error" id="err-phone"></div>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="auth.password">Parol</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-control" required minlength="6" autocomplete="new-password">
            <button type="button" class="password-toggle" id="pw-toggle">👁</button>
          </div>
          <div class="form-error" id="err-password"></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label class="form-label" data-i18n="auth.age">Yosh</label>
            <input type="number" id="age" class="form-control" min="1" max="120" required>
            <div class="form-error" id="err-age"></div>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="auth.email">Email</label>
            <input type="email" id="email" class="form-control" autocomplete="email">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-2" id="reg-btn">
          <span data-i18n="auth.register">Ro'yxatdan o'tish</span>
        </button>
      </form>

      <div class="auth-divider">yoki</div>
      <p class="text-center" style="color:var(--text-muted);font-size:.9rem">
        <span data-i18n="auth.have_account">Hisobingiz bormi?</span>
        <a href="login.html" style="font-weight:700;margin-left:.3rem" data-i18n="auth.login">Kirish</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    Theme.init();
    I18N.init().then(function() {
      Auth.updateNavbar();
      buildCountrySelect(document.getElementById('countryCode'), '+998');
    });
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('pw-toggle').addEventListener('click', function() {
      var pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.textContent = pw.type === 'password' ? '👁' : '🙈';
    });

    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.querySelectorAll('.form-error').forEach(function(el) { el.textContent = ''; });
      var btn = document.getElementById('reg-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px"></div>';
      try {
        var data = await api.post('/auth/register', {
          fullName: document.getElementById('fullName').value.trim(),
          username: document.getElementById('username').value.trim(),
          countryCode: document.getElementById('countryCode').value,
          phone: document.getElementById('phone').value.trim(),
          password: document.getElementById('password').value,
          age: parseInt(document.getElementById('age').value),
          email: document.getElementById('email').value.trim()
        });
        Auth.setSession(data.token, data.user);
        Toast.success(I18N.t('auth.register_success'));
        setTimeout(function() { window.location.href = 'index.html'; }, 700);
      } catch(err) {
        Toast.error(err.message);
        btn.disabled = false;
        btn.innerHTML = '<span>' + I18N.t('auth.register') + '</span>';
      }
    });
  </script>
<script src="js/bg-animation.js"></script>
</body>
</html>
