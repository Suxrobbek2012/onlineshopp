<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP - Profile</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .profile-layout{display:grid;grid-template-columns:260px 1fr;gap:2rem;padding:2rem 0;align-items:start}
    .profile-sidebar{background:var(--bg-card);border-radius:var(--radius);padding:2rem;text-align:center;position:sticky;top:calc(var(--nav-height) + 1rem);border:1px solid var(--border)}
    .avatar-wrap{position:relative;width:90px;height:90px;margin:0 auto 1rem}
    .avatar-img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--primary)}
    .avatar-placeholder{width:90px;height:90px;border-radius:50%;background:var(--grad-primary);display:flex;align-items:center;justify-content:center;font-size:2.2rem;color:#fff}
    .avatar-upload{position:absolute;bottom:0;right:0;background:var(--primary);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .profile-name{font-size:1.1rem;font-weight:700;margin-bottom:.2rem}
    .profile-username{color:var(--text-muted);font-size:.875rem;margin-bottom:1rem}
    .profile-tabs{display:flex;gap:.4rem;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:0.25rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .profile-tabs::-webkit-scrollbar{display:none}
    .tab-btn{padding:.45rem 1rem;border-radius:var(--radius-full);border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-weight:600;font-size:.85rem;transition:all var(--transition);white-space:nowrap;flex-shrink:0}
    .tab-btn.active{background:var(--grad-primary);color:#fff;border-color:transparent}
    .tab-content{display:none}.tab-content.active{display:block}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border);gap:1rem}
    .info-label{color:var(--text-muted);font-size:.875rem;flex-shrink:0}
    .info-value{font-weight:600;font-size:.9rem;text-align:right;word-break:break-all}
    .order-item{padding:1rem;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.75rem;background:var(--bg-card)}
    .order-status{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.75rem;font-weight:700}
    .status-pending{background:#fff3cd;color:#856404}
    .status-confirmed{background:#d1ecf1;color:#0c5460}
    .status-shipped{background:#cce5ff;color:#004085}
    .status-delivered{background:#d4edda;color:#155724}
    .status-cancelled{background:#f8d7da;color:#721c24}
    @media(max-width:900px){.profile-layout{grid-template-columns:220px 1fr}}
    @media(max-width:768px){
      .profile-layout{grid-template-columns:1fr;gap:1rem;padding:1rem 0}
      .profile-sidebar{position:static;padding:1.5rem}
      .avatar-wrap{width:80px;height:80px}
      .avatar-img,.avatar-placeholder{width:80px;height:80px}
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="container">
    <div class="profile-layout">
      <aside class="profile-sidebar">
        <div class="avatar-wrap">
          <div id="avatar-display"></div>
          <button class="avatar-upload" id="avatar-btn" title="Upload photo">📷</button>
          <input type="file" id="avatar-input" accept="image/*" style="display:none">
        </div>
        <div class="profile-name" id="sidebar-name">Loading...</div>
        <div class="profile-username" id="sidebar-username">@...</div>
        <button class="btn btn-primary btn-block" id="edit-profile-btn" data-i18n="profile.edit">Tahrirlash</button>
      </aside>

      <main>
        <div class="profile-tabs">
          <button class="tab-btn active" data-tab="info" data-i18n="profile.title">Profil</button>
          <button class="tab-btn" data-tab="orders" data-i18n="profile.orders">Buyurtmalar</button>
          <button class="tab-btn" data-tab="favorites" data-i18n="profile.favorites">Sevimlilar</button>
          <button class="tab-btn" data-tab="settings" data-i18n="profile.settings">Sozlamalar</button>
        </div>

        <!-- Info tab -->
        <div class="tab-content active card" id="tab-info" style="padding:1.5rem">
          <div id="info-view">
            <div class="info-row"><span class="info-label">Full Name</span><span id="info-fullName"></span></div>
            <div class="info-row"><span class="info-label">Username</span><span id="info-username"></span></div>
            <div class="info-row"><span class="info-label">Phone</span><span id="info-phone"></span></div>
            <div class="info-row"><span class="info-label">Age</span><span id="info-age"></span></div>
            <div class="info-row"><span class="info-label">Email</span><span id="info-email"></span></div>
          </div>
          <div id="info-edit" style="display:none">
            <form id="edit-form">
              <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="edit-fullName" class="form-control"></div>
              <div class="form-group"><label class="form-label">Username</label><input type="text" id="edit-username" class="form-control"></div>
              <div class="form-group"><label class="form-label">Phone</label>
                <div class="phone-group">
                  <select id="edit-countryCode" class="form-control country-select"></select>
                  <input type="tel" id="edit-phone" class="form-control phone-input">
                </div>
              </div>
              <div class="form-group"><label class="form-label">Age</label><input type="number" id="edit-age" class="form-control" min="1" max="120"></div>
              <div class="form-group"><label class="form-label">Email</label><input type="email" id="edit-email" class="form-control"></div>
              <div class="flex gap-1 mt-2">
                <button type="submit" class="btn btn-primary" data-i18n="profile.save">Saqlash</button>
                <button type="button" class="btn btn-secondary" id="cancel-edit" data-i18n="profile.cancel">Bekor qilish</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Orders tab -->
        <div class="tab-content" id="tab-orders">
          <div id="orders-list"><div class="loading-overlay"><div class="spinner"></div></div></div>
        </div>

        <!-- Favorites tab -->
        <div class="tab-content" id="tab-favorites">
          <div id="favorites-grid" class="products-grid"></div>
        </div>

        <!-- Settings tab -->
        <div class="tab-content card" id="tab-settings" style="padding:1.5rem">
          <h3 class="mb-2">Parolni o'zgartirish</h3>
          <form id="pw-form">
            <div class="form-group"><label class="form-label">New Password</label>
              <div class="password-wrapper">
                <input type="password" id="new-password" class="form-control" minlength="6">
                <button type="button" class="password-toggle" id="pw-toggle">👁</button>
              </div>
            </div>
            <div class="form-group"><label class="form-label">Confirm Password</label>
              <input type="password" id="confirm-password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
          </form>
          <hr style="margin:2rem 0;border-color:var(--border)">
          <h3 class="mb-2" style="color:#dc3545" data-i18n="profile.delete_account">Hisobni o'chirish</h3>
          <p class="text-muted mb-2">Bu amalni qaytarib bo'lmaydi.</p>
          <button class="btn btn-danger" id="delete-account-btn">Hisobni o'chirish</button>
        </div>
      </main>
    </div>
  </div>

  <footer><div class="container"><p>© 2026 SHOP</p></div></footer>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    Theme.init();
    I18N.init().then(function() {
      Auth.updateNavbar();
      if (!Auth.requireAuth()) return;
      buildCountrySelect(document.getElementById('edit-countryCode'));
      loadProfile();
    });

    var userData = null;

    async function loadProfile() {
      try {
        var data = await api.get('/auth/me');
        userData = data.user;
        renderProfile();
        loadOrders();
        loadFavorites();
      } catch(e) { Toast.error(e.message); }
    }

    function renderProfile() {
      var u = userData;
      // Sidebar
      document.getElementById('sidebar-name').textContent = u.fullName;
      document.getElementById('sidebar-username').textContent = '@' + u.username;
      var avatarEl = document.getElementById('avatar-display');
      if (u.avatar) {
        avatarEl.innerHTML = '<img class="avatar-img" src="' + escapeHtml(getImageUrl(u.avatar)) + '" alt="avatar">';
      } else {
        avatarEl.innerHTML = '<div class="avatar-placeholder">' + u.fullName.charAt(0).toUpperCase() + '</div>';
      }
      // Info
      document.getElementById('info-fullName').textContent = u.fullName;
      document.getElementById('info-username').textContent = '@' + u.username;
      document.getElementById('info-phone').textContent = (u.countryCode || '') + ' ' + u.phone;
      document.getElementById('info-age').textContent = u.age;
      document.getElementById('info-email').textContent = u.email || '—';
      // Edit form
      document.getElementById('edit-fullName').value = u.fullName;
      document.getElementById('edit-username').value = u.username;
      document.getElementById('edit-phone').value = u.phone;
      document.getElementById('edit-age').value = u.age;
      document.getElementById('edit-email').value = u.email || '';
      if (u.countryCode) document.getElementById('edit-countryCode').value = u.countryCode;
    }

    async function loadOrders() {
      try {
        var data = await api.get('/orders');
        var el = document.getElementById('orders-list');
        if (!data.orders.length) { el.innerHTML = '<p class="text-muted text-center mt-3">No orders yet</p>'; return; }
        el.innerHTML = data.orders.map(function(o) {
          return '<div class="order-item">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">' +
            '<strong>#' + o._id.slice(-8).toUpperCase() + '</strong>' +
            '<span class="order-status status-' + o.status + '">' + o.status.toUpperCase() + '</span>' +
            '</div>' +
            '<div style="color:var(--text-muted);font-size:.85rem">' + new Date(o.createdAt).toLocaleDateString() + ' · ' + o.items.length + ' items</div>' +
            '<div style="font-weight:700;color:var(--primary);margin-top:.25rem">$' + o.finalPrice.toFixed(2) + '</div>' +
            '</div>';
        }).join('');
      } catch(e) {}
    }

    async function loadFavorites() {
      try {
        var data = await api.get('/auth/me');
        var favs = data.user.favorites || [];
        var el = document.getElementById('favorites-grid');
        if (!favs.length) { el.innerHTML = '<p class="text-muted text-center mt-3">No favorites yet</p>'; return; }
        el.innerHTML = favs.map(function(p) { return renderProductCard(p, getUserFavoriteIds(data.user)); }).join('');
      } catch(e) {}
    }

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
      });
    });

    // Edit toggle
    document.getElementById('edit-profile-btn').addEventListener('click', function() {
      document.getElementById('info-view').style.display = 'none';
      document.getElementById('info-edit').style.display = 'block';
      document.querySelector('[data-tab="info"]').click();
    });
    document.getElementById('cancel-edit').addEventListener('click', function() {
      document.getElementById('info-view').style.display = 'block';
      document.getElementById('info-edit').style.display = 'none';
    });

    // Save profile
    document.getElementById('edit-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var fd = new FormData();
      fd.append('fullName', document.getElementById('edit-fullName').value);
      fd.append('username', document.getElementById('edit-username').value);
      fd.append('phone', document.getElementById('edit-phone').value);
      fd.append('countryCode', document.getElementById('edit-countryCode').value);
      fd.append('age', document.getElementById('edit-age').value);
      fd.append('email', document.getElementById('edit-email').value);
      try {
        var data = await api.putForm('/users/' + userData._id, fd);
        userData = data.user;
        Auth.setSession(Auth.getToken(), data.user);
        renderProfile();
        document.getElementById('info-view').style.display = 'block';
        document.getElementById('info-edit').style.display = 'none';
        Toast.success('Profile updated!');
      } catch(e) { Toast.error(e.message); }
    });

    // Avatar upload
    document.getElementById('avatar-btn').addEventListener('click', function() { document.getElementById('avatar-input').click(); });
    document.getElementById('avatar-input').addEventListener('change', async function() {
      if (!this.files[0]) return;
      var fd = new FormData();
      fd.append('avatar', this.files[0]);
      try {
        var data = await api.putForm('/users/' + userData._id, fd);
        userData = data.user;
        Auth.setSession(Auth.getToken(), data.user);
        renderProfile();
        Toast.success('Avatar updated!');
      } catch(e) { Toast.error(e.message); }
    });

    // Change password
    document.getElementById('pw-toggle').addEventListener('click', function() {
      var pw = document.getElementById('new-password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('pw-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var np = document.getElementById('new-password').value;
      var cp = document.getElementById('confirm-password').value;
      if (np !== cp) { Toast.error('Passwords do not match'); return; }
      if (np.length < 6) { Toast.error('Password must be at least 6 characters'); return; }
      try {
        var fd = new FormData();
        fd.append('newPassword', np);
        var data = await api.putForm('/users/' + userData._id, fd);
        userData = data.user;
        Auth.setSession(Auth.getToken(), data.user);
        Toast.success('Parol yangilandi!');
        this.reset();
      } catch(e) { Toast.error(e.message); }
    });

    // Delete account
    document.getElementById('delete-account-btn').addEventListener('click', async function() {
      if (!confirm('Hisobni o\'chirishni tasdiqlaysizmi? Bu amalni qaytarib bo\'lmaydi!')) return;
      try {
        await api.delete('/users/' + userData._id);
        Auth.clearSession();
        window.location.href = 'index.html';
      } catch(e) { Toast.error(e.message); }
    });
  </script>
<script src="js/bg-animation.js"></script>
</body>
</html>
