<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP Admin — Users</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="./css/admin.css">
  <style>
    .admin-layout{display:flex!important}
    .admin-sidebar{position:fixed!important;left:0!important;top:0!important;width:220px!important;height:100vh!important;z-index:500!important;background:var(--bg-card)!important;border-right:1px solid var(--border)!important;overflow-y:auto!important;display:flex!important;flex-direction:column!important}
    .admin-main{margin-left:220px!important;flex:1!important;min-width:0!important;padding:1.75rem!important;min-height:100vh!important;background:var(--bg)!important}
    @media(max-width:900px){.admin-sidebar{transform:translateX(-100%)!important}.admin-sidebar.open{transform:translateX(0)!important}.admin-main{margin-left:0!important;padding:1rem!important}}
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-logo">🛍 SHOP Admin</div>
    <ul class="admin-nav">
      <li><a href="/admin/index.html">📊 Dashboard</a></li>
      <li><a href="/admin/products.html">📦 Products</a></li>
      <li><a href="/admin/orders.html">🛒 Orders</a></li>
      <li><a href="/admin/users.html" class="active">👥 Users</a></li>
      <li><a href="/admin/news.html">📰 News</a></li>
      <li><a href="/admin/coupons.html">🎟 Coupons</a></li>
      <li><a href="/index.html">🌐 View Site</a></li>
      <li><a href="#" id="admin-logout">🚪 Logout</a></li>
    </ul>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="admin-hamburger" id="admin-hamburger">☰</button>
        <h1 class="admin-title">👥 Foydalanuvchilar</h1>
      </div>
      <button class="theme-toggle" id="theme-toggle">🌙</button>
    </div>

    <div class="table-wrap">
      <table class="admin-table">
        <thead><tr><th>Ism</th><th>Username</th><th>Telefon</th><th>Email</th><th>Rol</th><th>Holat</th><th>Sana</th><th>Amallar</th></tr></thead>
        <tbody id="users-tbody">
          <tr><td colspan="8" style="text-align:center;padding:2rem"><div class="spinner" style="margin:0 auto"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
  Theme.init();
  if (!Auth.requireAdmin()) {}
  document.getElementById('theme-toggle').addEventListener('click', function() { Theme.toggle(); });
  document.getElementById('admin-logout').addEventListener('click', function(e) { e.preventDefault(); Auth.clearSession(); window.location.href = '../login.html'; });
  document.getElementById('admin-hamburger').addEventListener('click', function() {
    document.getElementById('admin-sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  });
  document.getElementById('sidebar-overlay').addEventListener('click', function() {
    document.getElementById('admin-sidebar').classList.remove('open');
    this.classList.remove('open');
  });

  async function loadUsers() {
    try {
      var data = await api.get('/users');
      var tbody = document.getElementById('users-tbody');
      if (!data.users.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">Foydalanuvchi yo\'q</td></tr>';
        return;
      }
      tbody.innerHTML = data.users.map(function(u) {
        return '<tr>' +
          '<td><strong>' + u.fullName + '</strong></td>' +
          '<td style="color:var(--primary)">@' + u.username + '</td>' +
          '<td>' + (u.countryCode || '') + ' ' + u.phone + '</td>' +
          '<td>' + (u.email || '—') + '</td>' +
          '<td><span class="badge ' + (u.role === 'admin' ? 'badge-featured' : 'badge-new') + '">' + u.role + '</span></td>' +
          '<td>' + (u.isBanned ? '<span style="color:var(--secondary);font-weight:600">🚫 Banned</span>' : '<span style="color:var(--accent);font-weight:600">✅ Active</span>') + '</td>' +
          '<td>' + new Date(u.createdAt).toLocaleDateString('uz-UZ') + '</td>' +
          '<td style="white-space:nowrap">' +
          '<button class="btn btn-sm ' + (u.isBanned ? 'btn-primary' : 'btn-ghost') + ' ban-btn" data-id="' + u._id + '" data-banned="' + u.isBanned + '" style="margin-right:.25rem">' + (u.isBanned ? 'Unban' : 'Ban') + '</button>' +
          '<button class="btn btn-sm btn-danger del-btn" data-id="' + u._id + '">🗑</button>' +
          '</td></tr>';
      }).join('');

      document.querySelectorAll('.ban-btn').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          var isBanned = this.dataset.banned === 'true';
          try { await api.put('/users/' + this.dataset.id + '/ban', { isBanned: !isBanned }); Toast.success(isBanned ? 'Unban qilindi' : 'Ban qilindi'); loadUsers(); }
          catch(e) { Toast.error(e.message); }
        });
      });
      document.querySelectorAll('.del-btn').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          if (!confirm('O\'chirishni tasdiqlaysizmi?')) return;
          try { await api.delete('/users/' + this.dataset.id); Toast.success('O\'chirildi'); loadUsers(); }
          catch(e) { Toast.error(e.message); }
        });
      });
    } catch(e) { Toast.error(e.message); }
  }
  loadUsers();
</script>
</body>
</html>
